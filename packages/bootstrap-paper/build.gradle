plugins {
    id "java"
}

group = "dev.plugdev"
version = "0.1.0"

repositories {
    mavenCentral()
    maven { url = "https://repo.papermc.io/repository/maven-public/" }
}

dependencies {
    compileOnly "io.papermc.paper:paper-api:1.20.6-R0.1-SNAPSHOT"
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    archiveBaseName = "plugdev-bootstrap-paper"
    archiveVersion = ""
}

processResources {
    filesMatching("plugin.yml") {
        expand("version": project.version)
    }
}

tasks.register("copyToCli", Copy) {
    dependsOn tasks.jar
    from tasks.jar.archiveFile
    into rootProject.projectDir.parentFile.toPath().resolve("cli/bootstrap").toFile()
}

tasks.named("build") {
    finalizedBy "copyToCli"
}
