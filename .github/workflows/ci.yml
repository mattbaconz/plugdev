name: PlugDev CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm install

      - name: Make Gradle wrappers executable
        run: chmod +x packages/bootstrap-paper/gradlew test/fixtures/paper-plugin/gradlew

      - name: Build bootstrap plugin
        working-directory: packages/bootstrap-paper
        run: ./gradlew build -q

      - name: Build CLI
        run: npm run build:cli

      - name: Build MCP
        run: npm run build -w @plugdev/mcp

      - name: Unit tests
        run: npm test

      - name: Build fixture plugin
        working-directory: test/fixtures/paper-plugin
        run: ./gradlew build -q

      - name: Prefetch Paper cache
        working-directory: test/fixtures/paper-plugin
        run: node ../../../packages/cli/dist/cli.js cache prefetch --version 1.21.4 --paper

      - name: Doctor smoke
        working-directory: test/fixtures/paper-plugin
        run: |
          node ../../../packages/cli/dist/cli.js doctor --json > doctor.json
          node -e "const d=require('./doctor.json'); if(!d.data.toolchainReady) process.exit(3); console.log('toolchainReady ok');"

      - name: MCP smoke
        run: npm run smoke -w @plugdev/mcp
        env:
          PLUGDEV_SMOKE_PORT: "25566"

      - name: Server boot smoke
        working-directory: test/fixtures/paper-plugin
        run: |
          timeout 90s node ../../../packages/cli/dist/cli.js --no-watch || test $? -eq 124
        continue-on-error: false
