name: PlugDev CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install dependencies
        run: npm install

      - name: Make Gradle wrappers executable
        run: chmod +x packages/bootstrap-paper/gradlew test/fixtures/paper-plugin/gradlew

      - name: Build bootstrap plugin
        working-directory: packages/bootstrap-paper
        run: ./gradlew build -q

      - name: Build CLI
        run: npm run build:cli

      - name: Build MCP
        run: npm run build -w @plugdev/mcp

      - name: Unit tests
        run: npm test

      - name: Restore PlugDev server cache
        uses: actions/cache@v4
        id: plugdev-server-cache
        with:
          path: ~/.plugdev/servers
          key: plugdev-servers-${{ runner.os }}-paper-1.21.4
          restore-keys: |
            plugdev-servers-${{ runner.os }}-paper-

      - name: Build fixture plugin
        working-directory: test/fixtures/paper-plugin
        run: ./gradlew build -q

      - name: Prefetch Paper cache
        working-directory: test/fixtures/paper-plugin
        run: node ../../../packages/cli/dist/cli.js cache prefetch --version 1.21.4 --paper --quiet

      - name: Doctor smoke
        working-directory: test/fixtures/paper-plugin
        run: |
          set +e
          node ../../../packages/cli/dist/cli.js doctor --json > doctor.json
          code=$?
          set -e
          # 0 = fully ready, 2 = toolchain ok but setup/cache incomplete
          if [ "$code" -ne 0 ] && [ "$code" -ne 2 ]; then
            exit "$code"
          fi
          node -e "const d=require('./doctor.json'); if(!d.data.toolchainReady) process.exit(3); if(!d.data.bootstrap?.ok) process.exit(4); console.log('toolchainReady + bootstrap ok');"

      - name: Maven fixture doctor + build
        working-directory: test/fixtures/maven-plugin
        run: |
          set +e
          node ../../../packages/cli/dist/cli.js doctor --json > doctor.json
          code=$?
          set -e
          # 0 = fully ready, 2 = toolchain ok but setup/cache incomplete
          if [ "$code" -ne 0 ] && [ "$code" -ne 2 ]; then
            exit "$code"
          fi
          node -e "const d=require('./doctor.json'); if(d.data.projectType!=='plugin') process.exit(3); if(d.data.buildSystem!=='maven') process.exit(4); console.log('maven fixture detect ok');"
          node ../../../packages/cli/dist/cli.js build --json

      - name: MCP smoke
        run: npm run smoke -w @plugdev/mcp
        env:
          PLUGDEV_SMOKE_PORT: "25566"

      - name: Reload smoke (Gradle)
        run: npm run smoke:reload -w @plugdev/cli
        env:
          PLUGDEV_RELOAD_SMOKE_PORT: "25567"

      - name: Reload smoke (Maven)
        run: npm run smoke:reload -w @plugdev/cli
        env:
          PLUGDEV_RELOAD_SMOKE_PORT: "25568"
          PLUGDEV_RELOAD_SMOKE_FIXTURE: maven-plugin

      - name: Server boot smoke
        working-directory: test/fixtures/paper-plugin
        run: |
          timeout 90s node ../../../packages/cli/dist/cli.js --no-watch || test $? -eq 124
        continue-on-error: false
