name: PlugDev CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm install

      - name: Build bootstrap plugin
        working-directory: packages/bootstrap-paper
        run: ./gradlew build -q

      - name: Build CLI
        run: npm run build:cli

      - name: Build fixture plugin
        working-directory: test/fixtures/paper-plugin
        run: ./gradlew build -q

      - name: Doctor smoke
        working-directory: test/fixtures/paper-plugin
        run: node ../../../packages/cli/dist/cli.js doctor

      - name: Server boot smoke
        working-directory: test/fixtures/paper-plugin
        run: |
          timeout 90s node ../../../packages/cli/dist/cli.js --no-watch || test $? -eq 124
        continue-on-error: false
